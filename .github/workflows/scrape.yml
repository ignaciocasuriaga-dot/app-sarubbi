name: Scrape Bimbo Prices

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape
        run: node src/main.js

      - name: Generate PDF
        run: node src/pdf.js

      - name: Telegram notify (si está configurado)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT || '5' }}
        run: node src/notify.js
        continue-on-error: true

      - name: Copy PDF to public/data
        run: |
          mkdir -p public/data
          LATEST_PDF=$(ls -t data/output/*.pdf 2>/dev/null | head -n1 || true)
          if [ -n "$LATEST_PDF" ]; then cp "$LATEST_PDF" public/data/latest.pdf; fi
          echo "Contenido de public/data/:"
          ls -lh public/data/

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data data/output
          if git diff --staged --quiet; then
            echo "Sin cambios — no commit."
            exit 0
          fi
          git commit -m "chore: actualizar precios $(date -u +%Y-%m-%dT%H:%M)Z"
          # Retry con rebase si alguien pusheó en paralelo
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push falló (intento $i), esperando 5s..."
            sleep 5
          done
          exit 1
