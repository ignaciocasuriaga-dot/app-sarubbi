name: Setup Vercel Environment

on:
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set env vars in Vercel via API
        run: |
          set -e
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          DISPATCH="${{ secrets.DISPATCH_TOKEN }}"
          PROJECT="gondola-sarubbi"

          echo "=== Getting Vercel user info ==="
          USER_INFO=$(curl -sf "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $TOKEN")
          echo "$USER_INFO" | python3 -c "import json,sys; u=json.load(sys.stdin)['user']; print('User:', u.get('username') or u.get('email'))"

          echo "=== Getting teams ==="
          TEAMS=$(curl -sf "https://api.vercel.com/v2/teams" \
            -H "Authorization: Bearer $TOKEN")
          echo "$TEAMS" | python3 -c "import json,sys; [print('Team:', t['slug'], t['id']) for t in json.load(sys.stdin).get('teams',[])]"

          # Try setting env var on personal account first, then each team
          set_env() {
            local QUERY="$1"
            local KEY="$2"
            local VALUE="$3"
            local TYPE="${4:-encrypted}"
            echo "--- Setting $KEY (query: $QUERY) ---"
            RESULT=$(curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env$QUERY" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"$TYPE\",\"target\":[\"production\",\"preview\",\"development\"]}")
            echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print('  OK -', d.get('key','?')) if d.get('key') else print('  ERR:', d.get('error',d))"
          }

          # Personal account (no team)
          set_env "" "GITHUB_TOKEN" "$DISPATCH"
          set_env "" "GITHUB_REPO"  "ignaciocasuriaga-dot/app-sarubbi" "plain"

          # Try each team
          TEAM_SLUGS=$(echo "$TEAMS" | python3 -c "import json,sys; [print(t['slug']) for t in json.load(sys.stdin).get('teams',[])]" 2>/dev/null || echo "")
          for SLUG in $TEAM_SLUGS; do
            QUERY="?slug=$SLUG"
            set_env "$QUERY" "GITHUB_TOKEN" "$DISPATCH"
            set_env "$QUERY" "GITHUB_REPO"  "ignaciocasuriaga-dot/app-sarubbi" "plain"
          done
