name: Setup Vercel Environment

on:
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set env vars in Vercel via API
        run: |
          PROJECT="gondola-sarubbi"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Get team/user info
          USER=$(curl -s "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.user.username // .user.name')
          echo "Vercel user: $USER"

          # Get project ID
          PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.id')
          echo "Project ID: $PROJECT_ID"

          # Set GITHUB_TOKEN
          curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"GITHUB_TOKEN\",\"value\":\"${{ secrets.DISPATCH_TOKEN }}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            | jq '{key: .key, created: .createdAt}'

          # Set GITHUB_REPO
          curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"key":"GITHUB_REPO","value":"ignaciocasuriaga-dot/app-sarubbi","type":"plain","target":["production","preview"]}' \
            | jq '{key: .key, created: .createdAt}'

          echo "✅ Done"
