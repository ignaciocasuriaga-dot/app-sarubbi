name: Setup Vercel Environment

on:
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Vercel env vars
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          DISPATCH="${{ secrets.DISPATCH_TOKEN }}"
          PROJECT="app-sarubbi"

          echo "=== Vercel user ==="
          curl -sf "https://api.vercel.com/v2/user" -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import json,sys; u=json.load(sys.stdin)['user']; print('  login:', u.get('username') or u.get('email'))"

          echo "=== Project ID ==="
          PROJ=$(curl -sf "https://api.vercel.com/v9/projects/$PROJECT" -H "Authorization: Bearer $TOKEN" 2>&1)
          echo "$PROJ" | python3 -c "import json,sys; d=json.load(sys.stdin); print('  id:', d.get('id','?'), '| accountId:', d.get('accountId','?'))"
          PROJ_ID=$(echo "$PROJ" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))")
          ACCOUNT_ID=$(echo "$PROJ" | python3 -c "import json,sys; print(json.load(sys.stdin).get('accountId',''))")

          add_env() {
            local KEY="$1" VALUE="$2" TYPE="${3:-encrypted}"
            # Delete existing
            curl -s -X DELETE "https://api.vercel.com/v9/projects/$PROJ_ID/env/$KEY?teamId=$ACCOUNT_ID" \
              -H "Authorization: Bearer $TOKEN" > /dev/null 2>&1 || true
            # Add new
            RESULT=$(curl -s -X POST "https://api.vercel.com/v10/projects/$PROJ_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"$TYPE\",\"target\":[\"production\",\"preview\",\"development\"]}")
            echo "  $KEY: $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print('✅ OK' if d.get('key') else '❌ ' + str(d.get('error',d)[:80]))")"
          }

          echo "=== Setting env vars ==="
          add_env "GITHUB_TOKEN"  "$DISPATCH"
          add_env "TRIGGER_TOKEN" "$DISPATCH"
          add_env "GITHUB_REPO"   "ignaciocasuriaga-dot/app-sarubbi" "plain"

          echo "=== Triggering redeploy ==="
          DEPLOY=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$PROJECT\",\"target\":\"production\",\"gitSource\":{\"repoId\":\"$PROJECT\",\"ref\":\"main\",\"type\":\"github\"}}" 2>&1)
          echo "  Deploy result: $(echo $DEPLOY | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('url','?') or d.get('error',d)[:60])")"

          echo "=== Done ==="
